version: "3.9"

services:
  api:
    image: golang:1.22-alpine
    container_name: multi-tennet-api
    working_dir: /app
    volumes:
      - ./:/app
    environment:
      APP_ENV: ${APP_ENV}
      APP_PORT: 8080
      APP_NAME: ${APP_NAME}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_SSLMODE: disable
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      BASE_URL: ${BASE_URL}
    command: ["sh", "-c", "go run ./cmd/api"]
    ports:
      - "${APP_PORT}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - multi-tennet-net

