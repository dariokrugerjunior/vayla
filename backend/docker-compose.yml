version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: multi-tennet-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-multi_tennet}
    ports:
      - "${DB_PORT:-4567}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
      - ./seed.sql:/docker-entrypoint-initdb.d/002_seed.sql:ro
      - ./migrations:/migrations:ro
    networks:
      - multi-tennet-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-multi_tennet}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: multi-tennet-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:-redis}"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - multi-tennet-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  adminer:
    image: adminer:4
    container_name: multi-tennet-adminer
    restart: unless-stopped
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    ports:
      - "8081:8080"
    networks:
      - multi-tennet-net
    depends_on:
      postgres:
        condition: service_healthy

networks:
  multi-tennet-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
